<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/reset.css" />
    <link rel="stylesheet" href="/CSS/general.css" />
    <link rel="stylesheet" href="/CSS/feedback.css" />
    <link rel="icon" type="image/png" href="../assets/logoepicodewhite.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>FeedbackPage</title>
  </head>
  <body id="feedback-body">
    <header>
      <section class="up-logo">
        <img src="../assets/epicode_logo.png" alt="epicode logo" />
      </section>
    </header>
    <main>
      <section class="title">
        <h1>Tell us how it's going</h1>
        <p class="subtitle">
          From 0 to 10, how likely are you to recommend EPICODE<br />to a friend
          or a collague?
        </p>
      </section>
      <section class="stars-container">
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar1"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar2"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar3"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar4"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar5"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar6"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar7"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar8"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar9"
        />
        <img
          class="star can-hover"
          src="/assets/emptyStar.svg"
          alt="emptStar10"
        />
      </section>
      <p class="subtitle">
        Leave us un open feedback about your experience so far
      </p>
    </main>
    <footer>
      <form id="feedback-form">
        <input
          type="text"
          id="feedback"
          class="subtitle"
          name="feedback-input"
          placeholder="Write your comment here"
          required
        />
        <label for="feedback"></label>
        <section class="submit-button">
          <button type="button" id="submit-button">SUBMIT</button>
        </section>
      </form>
      <section class="info-button">
        <a href="../html/welcome.html"
          ><button type="button">RESTART</button></a
        >
      </section>
      <section class="info-button">
        <a href="https://epicode.com/it/"
          ><button type="button">MORE INFO</button></a
        >
      </section>
    </footer>
    <script src="/JS/main.js"></script>
  </body>
</html>
