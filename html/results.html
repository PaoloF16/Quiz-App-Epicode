<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/reset.css" />
    <link rel="stylesheet" href="../CSS/general.css" />
    <link rel="stylesheet" href="../CSS/results.css" />
    <title>Results-page</title>
  </head>
  <body id="results-body">
    <header class="up-logo">
      <img src="../assets/epicode_logo.png" alt="logo epicode" />
    </header>
    <main>
      <section>
        <h1>Results</h1>
        <h3>The summary of your answers:</h3>
      </section>
      <div class="button-start">
        <button id="button-check">Check your answers</button>
      </div>
      <section id="main-results-section">
        <div class="result-chart">
          <article class="rightAnswer">
            <!--risposte corrette-->
            <p>Correct</p>
            <p id="percentage-correct-answers"></p>
            <p id="number-correct-answers">number of correct answers</p>
          </article>
          <div class="chart-wrapper">
            <canvas id="myDonutChart"> </canvas>
            <article id="result-message">
              <h4>Congratulations!</h4>
              <p class="youPass">You passed the exam</p>
              <div class="certificate">
                <p>We'll send you the certificate in few menutes</p>
                <p>Check your email (including promotion / spam folder)</p>
              </div>
            </article>
          </div>
          <article class="wrongAnswer">
            <p>Wrong</p>
            <p id="percentage-wrong-answers">percentage</p>
            <p id="number-wrong-answers">wrong answers</p>
          </article>
        </div>
        <div id="check-section"></div>
        <div class="button-rate-us">
          <a class="button-start" href="./feedback.html"
            ><button>RATE US</button></a
          >
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../JS/main.js"></script>
  </body>
</html>
