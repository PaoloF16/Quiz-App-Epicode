<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/reset.css" />
    <link rel="stylesheet" href="../CSS/general.css" />
    <link rel="stylesheet" href="../CSS/results.css" />
    <title>Results-page</title>
  </head>
  <body id="results-body">
    <header class="up-logo">
      <img src="../assets/epicode_logo.png" alt="logo epicode" />
    </header>
    <main>
      <section>
        <h1>Results</h1>
        <h3>The summary of your answers:</h3>
      </section>

      <section id="main-results-section">
        <article>
          <!--risposte corrette-->
          <p>Correct</p>
          <p id="percentage-correct-answers"></p>
          <p id="number-correct-answers">number of correct answers</p>
        </article>

        <article>
          <p>Congratulations!</p>
          <p>You passed the exam.</p>
          <div>
            <p>
              We'll send you the certificate<br />
              in few menutes
            </p>
            <p>Check your email (including <br />promotion / spam folder)</p>
          </div>
        </article>
        <article>
          <p>wrong</p>
          <p id="percentage-wrong-answers">percentage</p>
          <p id="number-wrong-answers">wrong answers</p>
        </article>
        <div>
          <button class="button-rateus">RATE US</button>
        </div>
      </section>
    </main>
    <script src="../JS/main.js"></script>
  </body>
</html>
