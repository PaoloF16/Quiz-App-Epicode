<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/reset.css" />
    <link rel="stylesheet" href="../CSS/general.css" />
    <link rel="stylesheet" href="../CSS/results.css" />
    <title>Results-page</title>
  </head>
  <body>
    <header>
      <img class="logo" src="../assets/epicode_logo.png" alt="logo epicode" />
    </header>
    <main>
      <section>
        <h1>Results</h1>
        <h3>The summary of your answers:</h3>
      </section>
      <section id="main-results-section">
        <article>
          <!--risposte corrette-->
          <p>Correct</p>
          <p id="percentage-correct-answers">percentage</p>
          <p id="number-correct-answers">numner of correct answers</p>
        </article>
        <article>
          <h4>Congratulations!</h4>
          <p>You passed the exam</p>
          <p>We'll send you the certificate in few menutes</p>
          <p>Check your email (including promotion / spam folder)</p>
        </article>
        <article>
          <p>wrong</p>
          <p id="percentage-wrong-answers">percentage</p>
          <p id="number-wrong-answers">wrong answers</p>
        </article>
        <button>RATE US</button>
      </section>
    </main>
  </body>
</html>
